name: Build OpenWrt APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: OpenWrt release version
        required: true
        default: 25.12.4
      target:
        description: OpenWrt target platform
        required: true
        default: rockchip
      subtarget:
        description: OpenWrt subtarget
        required: true
        default: armv8

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    name: Prepare release
    runs-on: ubuntu-24.04
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Update release pull request or create release
        id: release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: googleapis/release-please-action@v4

  build-apk:
    name: Build luci-app-stability-monitor for rockchip/armv8
    needs: release-please
    runs-on: ubuntu-24.04

    env:
      PACKAGE_NAME: luci-app-stability-monitor
      OPENWRT_VERSION: ${{ github.event.inputs.openwrt_version || '25.12.4' }}
      OPENWRT_TARGET: ${{ github.event.inputs.target || 'rockchip' }}
      OPENWRT_SUBTARGET: ${{ github.event.inputs.subtarget || 'armv8' }}

    steps:
      - name: Checkout package
        uses: actions/checkout@v4

      - name: Restore prepared OpenWrt SDK
        id: sdk-cache
        uses: actions/cache/restore@v4
        with:
          path: openwrt-sdk
          key: openwrt-sdk-v2-${{ runner.os }}-${{ env.OPENWRT_VERSION }}-${{ env.OPENWRT_TARGET }}-${{ env.OPENWRT_SUBTARGET }}

      - name: Install SDK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            gettext \
            git \
            libncurses-dev \
            libssl-dev \
            python3 \
            python3-dev \
            python3-pyelftools \
            python3-setuptools \
            rsync \
            swig \
            unzip \
            wget \
            zstd \
            zlib1g-dev

      - name: Download OpenWrt SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          set -eux

          base_url="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}"
          sdk_archive="$(
            wget -qO- "${base_url}/" \
              | grep -oE 'openwrt-sdk-[^"]+\.tar\.(xz|zst)' \
              | head -n 1
          )"

          if [ -z "${sdk_archive}" ]; then
            echo "No SDK archive found at ${base_url}/"
            exit 1
          fi

          wget -O "openwrt-sdk.tar.${sdk_archive##*.}" "${base_url}/${sdk_archive}"

          mkdir openwrt-sdk
          tar --strip-components=1 -xf "openwrt-sdk.tar.${sdk_archive##*.}" -C openwrt-sdk

      - name: Install OpenWrt feeds
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        working-directory: openwrt-sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Save prepared OpenWrt SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: openwrt-sdk
          key: ${{ steps.sdk-cache.outputs.cache-primary-key }}

      - name: Add package to SDK
        run: |
          mkdir -p "openwrt-sdk/package/${PACKAGE_NAME}"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='openwrt-sdk' \
            ./ "openwrt-sdk/package/${PACKAGE_NAME}/"

      - name: Configure package
        working-directory: openwrt-sdk
        run: |
          echo "CONFIG_PACKAGE_${PACKAGE_NAME}=m" >> .config
          make defconfig

      - name: Build package
        working-directory: openwrt-sdk
        run: make "package/${PACKAGE_NAME}/compile" V=s -j"$(nproc)"

      - name: Collect APK artifacts
        run: |
          mkdir -p artifacts
          find openwrt-sdk/bin -type f -name "${PACKAGE_NAME}-*.apk" -print -exec cp {} artifacts/ \;

          if ! find artifacts -type f -name '*.apk' -print -quit | grep -q .; then
            echo "No APK artifacts found for ${PACKAGE_NAME}. Package outputs under openwrt-sdk/bin:"
            find openwrt-sdk/bin -type f \( -name '*.apk' -o -name '*.ipk' \) -print
            exit 1
          fi

          find artifacts -type f -name '*.apk' -print

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ env.OPENWRT_TARGET }}-${{ env.OPENWRT_SUBTARGET }}-${{ env.OPENWRT_VERSION }}
          path: artifacts/*.apk
          if-no-files-found: error

      - name: Publish GitHub release
        if: needs.release-please.outputs.release_created == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: artifacts/*.apk
          fail_on_unmatched_files: true
