name: Build and publish OpenWrt APK feed

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
    inputs:
      publish_feed:
        description: Build and deploy the signed feed to GitHub Pages
        type: boolean
        required: true
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    name: Prepare release
    runs-on: ubuntu-24.04
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Update release pull request or create release
        id: release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: googleapis/release-please-action@v4

  build-apk:
    name: Build and validate APK
    needs: release-please
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-24.04
    env:
      PACKAGE_NAME: luci-app-stability-monitor
      OPENWRT_VERSION: ${{ vars.OPENWRT_VERSION || '25.12.4' }}
      OPENWRT_TARGET: ${{ vars.OPENWRT_TARGET || 'rockchip' }}
      OPENWRT_SUBTARGET: ${{ vars.OPENWRT_SUBTARGET || 'armv8' }}
    steps:
      - name: Checkout package
        uses: actions/checkout@v4

      - name: Restore prepared OpenWrt SDK
        id: sdk-cache
        uses: actions/cache/restore@v4
        with:
          path: openwrt-sdk
          key: openwrt-sdk-v3-${{ runner.os }}-${{ env.OPENWRT_VERSION }}-${{ env.OPENWRT_TARGET }}-${{ env.OPENWRT_SUBTARGET }}

      - name: Install SDK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib gettext git \
            libncurses-dev libssl-dev python3 python3-dev python3-pyelftools \
            python3-setuptools rsync swig unzip wget zstd zlib1g-dev jq

      - name: Download and verify OpenWrt SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: scripts/download-sdk.sh

      - name: Install OpenWrt feeds
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        working-directory: openwrt-sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Save prepared OpenWrt SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: openwrt-sdk
          key: ${{ steps.sdk-cache.outputs.cache-primary-key }}

      - name: Add package to SDK
        run: |
          mkdir -p "openwrt-sdk/package/${PACKAGE_NAME}"
          rsync -a \
            --exclude='.git' --exclude='.github' --exclude='openwrt-sdk' \
            --exclude='artifacts' --exclude='site' \
            ./ "openwrt-sdk/package/${PACKAGE_NAME}/"

      - name: Configure and build package
        working-directory: openwrt-sdk
        run: |
          echo "CONFIG_PACKAGE_${PACKAGE_NAME}=m" >> .config
          make defconfig
          make "package/${PACKAGE_NAME}/compile" V=s -j"$(nproc)"

      - name: Collect and validate APK
        run: scripts/collect-apk.sh

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ env.OPENWRT_VERSION }}
          path: artifacts/*.apk
          if-no-files-found: error

      - name: Attach APK to GitHub release
        if: needs.release-please.outputs.release_created == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: artifacts/*.apk
          fail_on_unmatched_files: true

  publish-feed:
    name: Publish signed APK feed
    needs: [release-please, build-apk]
    if: >-
      needs.release-please.outputs.release_created == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_feed)
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    env:
      PACKAGE_NAME: luci-app-stability-monitor
      APK_SIGNING_KEY_NAME: ${{ vars.APK_SIGNING_KEY_NAME || 'stability-monitor.pem' }}
      OPENWRT_VERSION: ${{ vars.OPENWRT_VERSION || '25.12.4' }}
      OPENWRT_TARGET: ${{ vars.OPENWRT_TARGET || 'rockchip' }}
      OPENWRT_SUBTARGET: ${{ vars.OPENWRT_SUBTARGET || 'armv8' }}
    steps:
      - name: Checkout package
        uses: actions/checkout@v4

      - name: Download current APK
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ vars.OPENWRT_VERSION || '25.12.4' }}
          path: artifacts

      - name: Download verified OpenWrt SDK tooling
        run: |
          scripts/download-sdk.sh
          openwrt-sdk/staging_dir/host/bin/apk --version

      - name: Build signed feed
        env:
          APK_SIGNING_KEY: ${{ secrets.APK_SIGNING_KEY }}
          APK: openwrt-sdk/staging_dir/host/bin/apk
          GH_TOKEN: ${{ github.token }}
        run: scripts/build-feed.sh

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
